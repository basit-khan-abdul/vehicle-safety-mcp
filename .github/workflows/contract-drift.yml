name: Contract drift

# The upstream NHTSA APIs are the product. This job re-runs the live smoke
# tests on a schedule and opens an issue if the contract drifts (an endpoint,
# field name, or response shape changed), so breakage is caught before users
# hit it — not on every push, where flaky third-party APIs would add noise.

on:
  schedule:
    - cron: "0 6 * * 1" # 06:00 UTC every Monday
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: read
  issues: write

jobs:
  live-tests:
    name: Live NHTSA smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run live smoke tests
        run: uv run pytest tests/live -v

      - name: Open an issue on contract drift
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = "contract-drift";
            const title = "⚠️ Contract drift: NHTSA live smoke tests are failing";
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The scheduled live smoke tests against the NHTSA APIs failed on ${new Date().toISOString().slice(0, 10)}.`,
              ``,
              `This usually means an upstream contract changed — an endpoint moved, a field was renamed, or a response shape shifted.`,
              ``,
              `**Failed run:** ${run}`,
              ``,
              `Check \`src/vehicle_safety_mcp/nhtsa.py\` against the current API responses and update the field lists / parsing as needed.`,
            ].join("\n");

            // Avoid piling up duplicate issues: comment on an existing open one instead.
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label,
            });

            if (open.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label],
              });
            }
